<!--
  SCENARIO: small-tap-targets
  CATEGORY: audit-signals
  SIGNALS TRIGGERED: smallTapTargets > 0
  EXPECTED FINDINGS: [small_tap_targets]
  EXPECTED GRADE: P2
  NOTES: Nav links and CTA use .tiny-link class (0.65rem, ~10px rendered height).
    The auditor measures bounding box height of interactive elements.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pioneer Home Services — Northampton, MA</title>
  <meta name="description" content="Reliable home services in Northampton, MA. Call (413) 555-0100.">
  <meta property="og:title" content="Pioneer Home Services">
  <meta property="og:description" content="Reliable home services in Northampton, MA.">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <header style="padding:0.25rem">
    <nav style="gap:0.25rem">
      <a href="#" class="site-name" style="font-size:0.6rem">Pioneer Home Services</a>
      <ul style="display:flex;gap:0.25rem;list-style:none">
        <!-- Intentionally tiny nav links -->
        <li><a href="#" class="tiny-link">Services</a></li>
        <li><a href="#" class="tiny-link">About</a></li>
        <li><a href="#contact" class="tiny-link">Contact</a></li>
      </ul>
    </nav>
  </header>
  <main>
    <section class="hero">
      <h1>Pioneer Home Services</h1>
      <p>Serving Northampton since 2005.</p>
      <!-- Intentionally tiny CTA -->
      <a href="tel:+14135550100" class="tiny-link"
        style="display:inline-block;background:#1a3c5e;color:#fff;margin-top:0.5rem">
        Call (413) 555-0100
      </a>
    </section>
    <section>
      <h2>Services</h2>
      <p>
        <a href="#" class="tiny-link">Plumbing</a> ·
        <a href="#" class="tiny-link">Heating</a> ·
        <a href="#" class="tiny-link">Drain Cleaning</a>
      </p>
    </section>
    <section id="contact">
      <h2>Contact Us</h2>
      <p class="phone-cta">Call: <a href="tel:+14135550100">(413) 555-0100</a></p>
      <form class="contact-form" action="#" method="post">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required>
        <label for="message">Message</label>
        <textarea id="message" name="message"></textarea>
        <button type="submit" class="btn">Send Message</button>
      </form>
    </section>
  </main>
  <footer>
    <p>&copy; 2025 Pioneer Home Services &mdash; Northampton, MA</p>
  </footer>
</body>
</html>
